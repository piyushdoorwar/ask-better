<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AskBetter</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <div class="brand">
          <img class="brand-icon" src="../assets/ask-better-icon.svg" alt="AskBetter icon" />
          <h1>AskBetter</h1>
        </div>
        <span class="badge">LOCAL</span>
      </div>

      <div class="status" id="statusBox">
        <div class="status-top">
          <span class="eyebrow">Connection</span>
          <span class="status-dot" aria-hidden="true"></span>
        </div>
        <div id="statusText"></div>
      </div>

      <div class="field">
        <p class="section-title">Default Optimization Style</p>
        <label for="defaultPreset">Preset</label>
        <div class="csel">
          <select id="defaultPreset" hidden>
            <optgroup label="Core">
              <option value="structured">Story structured</option>
              <option value="concise">Concise</option>
              <option value="grammar">Fix grammar</option>
              <option value="clarity">Improve clarity</option>
            </optgroup>
            <optgroup label="Style">
              <option value="persuasive">Persuasive</option>
              <option value="executive">Executive brief</option>
              <option value="coaching">Coaching tone</option>
              <option value="email_rewrite">Email rephrase/rewrite</option>
            </optgroup>
            <optgroup label="Critical">
              <option value="devils_advocate">Devil's advocate</option>
              <option value="first_principles">First principles</option>
              <option value="risk_audit">Risk audit</option>
            </optgroup>
            <optgroup label="Delivery">
              <option value="technical_spec">Technical spec</option>
              <option value="implementation_plan">Implementation plan</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div class="field">
        <p class="section-title">Rewrite Options</p>
        <div class="toggle-row">
          <label for="keepUserVoice">Keep user voice</label>
          <span class="switch">
            <input type="checkbox" id="keepUserVoice" />
            <span class="slider"></span>
          </span>
        </div>
      </div>

      <div class="field">
        <p class="section-title">Model</p>
        <label for="providerSelect">Provider</label>
        <div class="csel">
          <select id="providerSelect" hidden>
            <option value="gemini" data-icon="../assets/icons/ui/gemini-color.svg">Google Gemini</option>
            <option value="openai" data-icon="../assets/icons/ui/openai.svg">OpenAI</option>
            <option value="anthropic" data-icon="../assets/icons/ui/claude-color.svg">Anthropic Claude</option>
          </select>
        </div>
        <label id="modelLabel" for="modelSelect">Gemini model</label>
        <div class="csel">
          <select id="modelSelect" hidden>
            <option value="gpt-5.2">gpt-5.2</option>
            <option value="gpt-5-mini">gpt-5-mini</option>
            <option value="gpt-4.1">gpt-4.1</option>
            <option value="claude-sonnet-4-20250514">claude-sonnet-4-20250514</option>
            <option value="claude-opus-4-1-20250805">claude-opus-4-1-20250805</option>
            <option value="claude-3-7-sonnet-latest">claude-3-7-sonnet-latest</option>
            <option value="claude-3-5-haiku-latest">claude-3-5-haiku-latest</option>
            <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
            <option value="gemini-3-pro-preview">gemini-3-pro-preview</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          </select>
        </div>
      </div>

      <button class="open-settings" id="openSettingsBtn">Open settings</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
