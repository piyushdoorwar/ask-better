<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AskBetter</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <div class="brand">
          <span class="brand-mark">
            <img class="brand-icon" src="../assets/icons/icon.svg" alt="AskBetter icon" />
          </span>
          <div class="brand-text">
            <h1>AskBetter</h1>
            <span class="brand-sub">Prompt optimizer</span>
          </div>
        </div>
        <span class="badge">LOCAL</span>
      </div>

      <div class="status" id="statusBox">
        <span class="status-dot" aria-hidden="true"></span>
        <div class="status-body">
          <span class="eyebrow">Connection</span>
          <div id="statusText"></div>
        </div>
      </div>

      <div class="field">
        <label for="defaultPreset">Optimize preset</label>
        <div class="csel">
          <select id="defaultPreset" hidden>
            <optgroup label="Core">
              <option value="structured">Story structured</option>
              <option value="concise">Concise</option>
              <option value="grammar">Fix grammar</option>
              <option value="clarity">Improve clarity</option>
            </optgroup>
            <optgroup label="Style">
              <option value="persuasive">Persuasive</option>
              <option value="executive">Executive brief</option>
              <option value="coaching">Coaching tone</option>
              <option value="email_rewrite">Email rephrase/rewrite</option>
            </optgroup>
            <optgroup label="Critical">
              <option value="devils_advocate">Devil's advocate</option>
              <option value="first_principles">First principles</option>
              <option value="risk_audit">Risk audit</option>
            </optgroup>
            <optgroup label="Delivery">
              <option value="technical_spec">Technical spec</option>
              <option value="implementation_plan">Implementation plan</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="providerSelect">Provider</label>
          <div class="csel">
            <select id="providerSelect" hidden>
              <option value="gemini" data-icon="../assets/icons/ui/gemini-color.svg">Google Gemini</option>
              <option value="openai" data-icon="../assets/icons/ui/openai.svg">OpenAI</option>
              <option value="anthropic" data-icon="../assets/icons/ui/claude-color.svg">Anthropic Claude</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label id="modelLabel" for="modelSelect">Gemini model</label>
          <div class="csel">
            <!-- Options are populated at runtime from the provider's live model
                 list (see ui/models.js / popup.js renderModelOptions). -->
            <select id="modelSelect" hidden></select>
          </div>
          <p class="model-hint" id="modelHint" hidden>Add your API key in settings to load models.</p>
        </div>
      </div>

      <div class="field">
        <label for="phraseBetterPreset">Phrase Better preset</label>
        <div class="csel">
          <select id="phraseBetterPreset" hidden>
            <option value="fix_grammar">Fix grammar (default)</option>
            <option value="rephrase">Rephrase</option>
            <option value="casual">Casual reply</option>
            <option value="formal">Formal message</option>
          </select>
        </div>
      </div>

      <div class="toggle-row">
        <div class="toggle-copy">
          <span class="toggle-name">Keep my voice</span>
          <span class="toggle-desc">Preserve tone &amp; style</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="keepUserVoiceToggle" />
          <span class="slider" aria-hidden="true"></span>
        </label>
      </div>

      <div class="shortcut-hint">
        <span class="shortcut-text">Optimize any prompt</span>
        <span class="shortcut-keys">
          <kbd id="shortcutMod">Ctrl</kbd>
          <kbd>&#8679;</kbd>
          <kbd>O</kbd>
        </span>
      </div>

      <button class="open-settings" id="openSettingsBtn">Open settings</button>
    </div>

    <script src="models.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
