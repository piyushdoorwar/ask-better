<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptForge</title>
        <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <div class="brand">
          <img class="brand-icon" src="../assets/promptforge-icon.svg" alt="PromptForge icon" />
          <h1>PromptForge</h1>
        </div>
        <span class="badge">LOCAL</span>
      </div>

      <div class="status" id="statusBox">
        <div class="status-top">
          <span class="eyebrow">Connection</span>
          <span class="status-dot" aria-hidden="true"></span>
        </div>
        <div id="statusText"></div>
        <a
          id="missingKeyLink"
          class="status-link"
          href="https://platform.openai.com/api-keys"
          target="_blank"
          rel="noopener noreferrer"
          hidden
        >
          Generate API key
        </a>
      </div>

      <div class="field">
        <p class="section-title">Default Optimization Style</p>
        <label for="defaultPreset">Preset</label>
        <select id="defaultPreset">
          <option value="structured">Structured</option>
          <option value="concise">Concise</option>
          <option value="grammar">Fix grammar</option>
          <option value="clarity">Improve clarity</option>
        </select>
      </div>

      <div class="field">
        <p class="section-title">Model</p>
        <label for="openaiModel">Model</label>
        <select id="openaiModel">
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          <option value="gpt-4.1">gpt-4.1</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-4o">gpt-4o</option>
        </select>
      </div>

      <div class="toggles">
        <p class="section-title">Integrations</p>
        <div class="toggle-row">
          <label for="enableChatGPT">Enable on ChatGPT</label>
          <span class="switch">
            <input type="checkbox" id="enableChatGPT" />
            <span class="slider"></span>
          </span>
        </div>
        <div class="toggle-row">
          <label for="enableGemini">Enable on Gemini</label>
          <span class="switch">
            <input type="checkbox" id="enableGemini" />
            <span class="slider"></span>
          </span>
        </div>
      </div>

      <button class="open-settings" id="openSettingsBtn">Open settings</button>
      <div class="foot">Runs locally. Your prompt text never leaves your browser except direct provider calls.</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
